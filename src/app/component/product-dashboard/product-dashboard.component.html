<div class="row">
    <div class="col-md-12 text-right">
        <button routerLink="addproduct" mat-raised-button color="primary" class="mt-3">
            Add Product
        </button>
    </div>
    <div class="col-md-4 product-list">
        <ul class="list-group">
            <li [routerLink]="['/product', product.pid]" routerLinkActive="active"
                class="list-group-item d-flex justify-content-between align-items-center"
                *ngFor="let product of productArr">
                <img [src]="product.pimg" [alt]="product.pname" width="60" height="60" class="mr-3 rounded">
                {{ product.pname }}
                <small class="badge" [ngClass]="{
      'badge-primary': product.pstatus === 'In-Progress',
      'badge-success': product.pstatus === 'Dispatched',
      'badge-warning': product.pstatus === 'Delivered'}">
                    {{ product.pstatus }}
                </small>
            </li>
        </ul>

    </div>
    <div class="col-md-8 product-details">
        <router-outlet></router-outlet>
    </div>
</div>
